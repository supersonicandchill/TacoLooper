

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🌮 Taco Looper</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0B0A08;
            --surf:    #161310;
            --surf2:   #201C14;
            --border:  #36301E;
            --accent:  #E8763A;
            --accentD: rgba(232,118,58,.14);
            --gold:    #F0B429;
            --goldD:   rgba(240,180,41,.18);
            --text:    #EDE8DF;
            --muted:   #6E6455;
            --green:   #4ADE80;
            --red:     #FF5757;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overscroll-behavior: none; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex; flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ─── HEADER ─── */
        header {
            flex-shrink: 0;
            background: var(--surf);
            border-bottom: 1px solid var(--border);
            padding: 12px 18px;
            display: flex; align-items: center; gap: 12px;
        }
        .logo-taco { font-size: 1.9rem; line-height: 1; }
        .logo-text { flex: 1; }
        .logo-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.85rem; color: var(--accent);
            letter-spacing: 0.06em; line-height: 1;
        }
        .logo-sub {
            font-size: 0.58rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.14em;
        }
        .loop-badge {
            background: var(--accentD); border: 1px solid var(--accent);
            color: var(--accent); border-radius: 20px;
            padding: 3px 10px; font-size: 0.68rem; font-weight: 700;
            opacity: 0; transition: opacity 0.3s;
            white-space: nowrap;
        }
        .loop-badge.show { opacity: 1; }

        /* ─── MAIN ─── */
        main {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* ─── DROP ZONE ─── */
        .drop-zone {
            background: var(--surf); border: 2px dashed var(--border);
            border-radius: 16px; padding: 26px 20px;
            text-align: center; cursor: pointer;
            transition: border-color .2s, background .2s;
            -webkit-tap-highlight-color: transparent;
        }
        .drop-zone.has-file { padding: 13px 18px; border-style: solid; border-color: var(--border); }
        .drop-zone.drag-over { border-color: var(--accent); background: var(--accentD); }
        .dz-icon { font-size: 2.1rem; margin-bottom: 7px; }
        .dz-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; color: var(--accent); letter-spacing: 0.05em; }
        .dz-sub { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; }
        .file-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .file-name { font-size: 0.78rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 68%; }
        .file-dur { font-size: 0.85rem; color: var(--gold); font-weight: 700; white-space: nowrap; }

        /* ─── WAVEFORM ─── */
        .wave-wrap {
            position: relative;
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
        }
        #waveform {
            display: block; width: 100%; height: 108px;
            cursor: crosshair; touch-action: none;
        }
        .wave-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 10px 8px;
        }
        .wf-time { font-size: 0.6rem; color: var(--muted); }
        .wf-time.current { color: var(--gold); font-weight: 700; }

        /* ─── LOOP POINTS ─── */
        .loop-points { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
        .lp {
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 11px; padding: 9px 13px; text-align: center;
            transition: border-color .25s, background .25s;
        }
        .lp.flash { border-color: var(--gold); background: var(--goldD); }
        .lp-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 3px; }
        .lp-time { font-size: 1.0rem; color: var(--gold); font-weight: 700; }

        /* ─── TRANSPORT ─── */
        .transport { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
        .btn {
            background: var(--surf); border: 1px solid var(--border);
            color: var(--text); border-radius: 12px; padding: 13px 8px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.0rem;
            letter-spacing: 0.05em; cursor: pointer; text-align: center;
            transition: opacity .12s, transform .12s, background .15s, border-color .15s, color .15s;
            -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1.3;
        }
        .btn:active { opacity: .7; transform: scale(.97); }
        .btn:disabled { opacity: .3; pointer-events: none; }

        .btn-play {
            grid-column: span 2; padding: 19px 8px; font-size: 1.55rem;
            background: var(--accent); border-color: transparent; color: #000; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(232,118,58,.3);
            transition: all .15s;
        }
        .btn-play.playing {
            background: var(--surf2); border-color: var(--accent); color: var(--accent);
            box-shadow: 0 0 20px rgba(232,118,58,.15);
        }
        .btn-play.playing .pulse { animation: pulse 1s ease-in-out infinite; display: inline-block; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .btn-play:not(.playing) .pulse { display: inline-block; }

        .btn-loop.on {
            background: var(--accentD); border-color: var(--accent); color: var(--accent);
        }
        .btn-in:active, .btn-out:active { border-color: var(--gold); }
        .btn-reset { color: var(--muted); }

        /* ─── SPEED ─── */
        .speed-card {
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 14px; padding: 13px 16px;
        }
        .speed-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
        .speed-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.05em; color: var(--muted); }
        .speed-val { font-size: 1.05rem; font-weight: 700; color: var(--gold); }
        .presets { display: flex; gap: 5px; margin-bottom: 9px; }
        .pre {
            flex: 1; background: var(--surf2); border: 1px solid var(--border);
            color: var(--muted); padding: 6px 2px; border-radius: 7px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.67rem;
            cursor: pointer; text-align: center;
            -webkit-tap-highlight-color: transparent; transition: all .12s;
        }
        .pre:active { transform: scale(.95); }
        .pre.active { background: var(--accentD); border-color: var(--accent); color: var(--accent); }

        input[type="range"] {
            width: 100%; -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 21px; height: 21px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(232,118,58,.5);
        }

        /* ─── STATUS ─── */
        .status {
            text-align: center; font-size: 0.62rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 6px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-taco">🌮</div>
    <div class="logo-text">
        <div class="logo-name">Taco Looper</div>
        <div class="logo-sub">Voice Memo → Infinite Loop Machine</div>
    </div>
    <div class="loop-badge" id="loopBadge">× <span id="loopCount">0</span></div>
</header>

<main>
    <!-- File Picker -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div id="dzInner">
            <div class="dz-icon">📂</div>
            <div class="dz-label">Select Voice Memo</div>
            <div class="dz-sub">Tap to choose · drag & drop works too</div>
        </div>
    </div>
    <input type="file" id="fileInput" accept="audio/*" style="display:none">

    <!-- Waveform -->
    <div class="wave-wrap" id="waveWrap">
        <canvas id="waveform" width="1200" height="216"></canvas>
        <div class="wave-footer">
            <span class="wf-time" id="tStart">0:00.0</span>
            <span class="wf-time current" id="tCurrent">—</span>
            <span class="wf-time" id="tEnd">—</span>
        </div>
    </div>

    <!-- Loop Points Display -->
    <div class="loop-points">
        <div class="lp" id="lpInCard">
            <div class="lp-label">⏮ Loop In</div>
            <div class="lp-time" id="lpIn">0:00.0</div>
        </div>
        <div class="lp" id="lpOutCard">
            <div class="lp-label">Loop Out ⏭</div>
            <div class="lp-time" id="lpOut">—</div>
        </div>
    </div>

    <!-- Transport -->
    <div class="transport">
        <button class="btn btn-play" id="playBtn" onclick="togglePlay()" disabled>
            <span class="pulse">▶</span> PLAY
        </button>
        <button class="btn btn-loop on" id="loopBtn" onclick="toggleLoop()">🔁 LOOP ON</button>
        <button class="btn btn-in" onclick="markIn()">⏮ SET IN</button>
        <button class="btn btn-out" onclick="markOut()">SET OUT ⏭</button>
        <button class="btn btn-reset" onclick="resetLoop()" style="grid-column:span 2; font-size:.85rem;">↺ Reset Loop to Full File</button>
    </div>

    <!-- Speed -->
    <div class="speed-card">
        <div class="speed-head">
            <div class="speed-title">PLAYBACK SPEED</div>
            <div class="speed-val" id="speedVal">1.0×</div>
        </div>
        <div class="presets">
            <div class="pre" data-spd="0.5"  onclick="setSpeed(0.5)">0.5×</div>
            <div class="pre" data-spd="0.75" onclick="setSpeed(0.75)">0.75×</div>
            <div class="pre active" data-spd="1"  onclick="setSpeed(1.0)">1×</div>
            <div class="pre" data-spd="1.25" onclick="setSpeed(1.25)">1.25×</div>
            <div class="pre" data-spd="1.5" onclick="setSpeed(1.5)">1.5×</div>
            <div class="pre" data-spd="2"   onclick="setSpeed(2.0)">2×</div>
        </div>
        <input type="range" id="speedRange" min="0.25" max="2.5" step="0.05" value="1.0"
               oninput="setSpeed(parseFloat(this.value))">
    </div>

    <div class="status" id="status">Select an audio file to begin</div>
</main>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let audioCtx = null, audioBuffer = null, sourceNode = null, gainNode = null;
let isPlaying = false, loopEnabled = true;
let loopStart = 0, loopEnd = 0;
let pbStartTime = 0, pbStartOffset = 0; // playback position tracking
let currentSpeed = 1.0;
let loopCount = 0, lcBaseTime = 0;
let animFrame = null;
let dragMode = null; // null | 'in' | 'out' | 'seek'
let cachedPeaks = null;

// ─── ELEMENTS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('waveform');
const ctx    = canvas.getContext('2d');
const playBtn  = document.getElementById('playBtn');
const loopBtn  = document.getElementById('loopBtn');
const dropZone = document.getElementById('dropZone');
const fileInput= document.getElementById('fileInput');

// ─── FILE LOADING ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('audio/')) loadFile(f);
});

async function loadFile(file) {
    stopPlayback();
    setStatus('Loading…');
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ab = await file.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(ab);
    } catch(e) {
        setStatus('Could not decode audio: ' + e.message); return;
    }

    loopStart = 0; loopEnd = audioBuffer.duration;
    loopCount = 0; lcBaseTime = 0; cachedPeaks = null;

    dropZone.classList.add('has-file');
    document.getElementById('dzInner').innerHTML =
        `<div class="file-row">
            <span class="file-name">🎵 ${file.name}</span>
            <span class="file-dur">${ft(audioBuffer.duration)}</span>
        </div>`;

    document.getElementById('tEnd').textContent = ft(audioBuffer.duration);
    document.getElementById('tStart').textContent = '0:00.0';
    updateLoopDisplay();
    drawWave();
    playBtn.disabled = false;
    setStatus('Loaded · tap waveform to seek · drag gold handles to trim loop');
}

// ─── WAVEFORM ─────────────────────────────────────────────────────────────────
function buildPeaks(count) {
    if (cachedPeaks && cachedPeaks.length === count) return cachedPeaks;
    const data = audioBuffer.getChannelData(0);
    const step = Math.floor(data.length / count);
    const peaks = new Float32Array(count);
    for (let i = 0; i < count; i++) {
        let max = 0;
        const s = i * step, e = Math.min(s + step, data.length);
        for (let j = s; j < e; j++) { const a = Math.abs(data[j]); if (a > max) max = a; }
        peaks[i] = max;
    }
    cachedPeaks = peaks;
    return peaks;
}

function drawWave() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Base background
    ctx.fillStyle = '#161310';
    ctx.fillRect(0, 0, W, H);

    if (!audioBuffer) {
        // Placeholder center line
        ctx.fillStyle = '#2A2418';
        ctx.fillRect(0, H/2 - 1, W, 2);
        return;
    }

    const peaks = buildPeaks(W);
    const dur   = audioBuffer.duration;
    const inX   = Math.round((loopStart / dur) * W);
    const outX  = Math.round((loopEnd   / dur) * W);

    // Outside-loop dim overlay
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(0, 0, inX, H);
    ctx.fillRect(outX, 0, W - outX, H);

    // Inside-loop glow
    ctx.fillStyle = 'rgba(240,180,41,.05)';
    ctx.fillRect(inX, 0, outX - inX, H);

    // Center line
    ctx.fillStyle = '#2A2418';
    ctx.fillRect(0, H/2 - 1, W, 2);

    // Bars
    for (let i = 0; i < W; i++) {
        const peak = peaks[i];
        const bh   = Math.max(1, peak * (H - 12) * 0.5);
        ctx.fillStyle = (i >= inX && i <= outX) ? '#E8763A' : '#3A3020';
        ctx.fillRect(i, H/2 - bh, 1, bh * 2);
    }

    // Loop IN handle
    drawHandle(inX, H, true);
    // Loop OUT handle
    drawHandle(outX, H, false);

    // Playhead
    if (isPlaying || pbStartOffset > 0) {
        const pos = isPlaying ? getCurrentBufferTime() : pbStartOffset;
        const px  = Math.round((pos / dur) * W);
        ctx.fillStyle = 'rgba(255,255,255,.85)';
        ctx.fillRect(px - 1, 0, 2, H);
        ctx.beginPath();
        ctx.arc(px, 0, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
    }
}

function drawHandle(x, H, isIn) {
    const TW = 14, TH = 18; // triangle size
    ctx.fillStyle = '#F0B429';
    // Vertical line
    ctx.fillRect(x - 1, 0, 2, H);
    // Top triangle
    ctx.beginPath();
    if (isIn) {
        ctx.moveTo(x - 1, 0); ctx.lineTo(x + TW, 0); ctx.lineTo(x - 1, TH);
    } else {
        ctx.moveTo(x + 1, 0); ctx.lineTo(x - TW, 0); ctx.lineTo(x + 1, TH);
    }
    ctx.closePath(); ctx.fill();
    // Bottom triangle (mirrored)
    ctx.beginPath();
    if (isIn) {
        ctx.moveTo(x - 1, H); ctx.lineTo(x + TW, H); ctx.lineTo(x - 1, H - TH);
    } else {
        ctx.moveTo(x + 1, H); ctx.lineTo(x - TW, H); ctx.lineTo(x + 1, H - TH);
    }
    ctx.closePath(); ctx.fill();
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
function ensureCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function getCurrentBufferTime() {
    if (!isPlaying || !audioBuffer) return pbStartOffset;
    const elapsed = (audioCtx.currentTime - pbStartTime) * currentSpeed;
    let pos = pbStartOffset + elapsed;
    if (loopEnabled && loopEnd > loopStart) {
        const d = loopEnd - loopStart;
        pos = loopStart + ((pos - loopStart) % d);
        if (pos < loopStart) pos = loopStart;
    }
    return Math.max(0, Math.min(pos, audioBuffer.duration));
}

function startPlayback(fromOffset) {
    ensureCtx();
    if (sourceNode) { sourceNode.onended = null; try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    cancelAnimationFrame(animFrame);

    const offset = fromOffset !== undefined
        ? Math.max(loopStart, Math.min(fromOffset, loopEnd))
        : loopStart;

    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.loop = loopEnabled;
    sourceNode.loopStart = loopStart;
    sourceNode.loopEnd   = loopEnd > loopStart ? loopEnd : audioBuffer.duration;
    sourceNode.playbackRate.value = currentSpeed;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1;
    sourceNode.connect(gainNode).connect(audioCtx.destination);

    pbStartOffset = offset;
    pbStartTime   = audioCtx.currentTime;
    loopCount     = 0;
    lcBaseTime    = audioCtx.currentTime;
    updateLoopBadge();

    sourceNode.start(0, offset);

    sourceNode.onended = () => {
        if (!loopEnabled && isPlaying) {
            isPlaying = false; pbStartOffset = 0;
            updatePlayBtn(); cancelAnimationFrame(animFrame); drawWave();
            setStatus('Finished · press play to restart');
        }
    };

    isPlaying = true;
    updatePlayBtn();
    animFrame = requestAnimationFrame(animate);
}

function stopPlayback() {
    if (sourceNode) { sourceNode.onended = null; try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    cancelAnimationFrame(animFrame);
    isPlaying = false;
    updatePlayBtn();
    drawWave();
}

function togglePlay() {
    if (!audioBuffer) return;
    if (isPlaying) { stopPlayback(); setStatus('Paused'); }
    else { startPlayback(pbStartOffset || loopStart); setStatus('Playing…'); }
}

function toggleLoop() {
    loopEnabled = !loopEnabled;
    loopBtn.classList.toggle('on', loopEnabled);
    loopBtn.textContent = loopEnabled ? '🔁 LOOP ON' : '🔁 LOOP OFF';
    if (isPlaying) startPlayback(getCurrentBufferTime());
}

function markIn() {
    if (!audioBuffer) return;
    const t = getCurrentBufferTime(); // returns pbStartOffset when not playing
    loopStart = Math.max(0, Math.min(t, loopEnd - 0.2));
    if (sourceNode) { sourceNode.loopStart = loopStart; pbStartTime = audioCtx.currentTime; pbStartOffset = getCurrentBufferTime(); lcBaseTime = audioCtx.currentTime; loopCount = 0; }
    updateLoopDisplay(); drawWave();
    flash('lpInCard');
    setStatus(`Loop In → ${ft(loopStart)}`);
}

function markOut() {
    if (!audioBuffer) return;
    const t = isPlaying ? getCurrentBufferTime() : audioBuffer.duration;
    loopEnd = Math.min(audioBuffer.duration, Math.max(t, loopStart + 0.2));
    if (sourceNode) { sourceNode.loopEnd = loopEnd; }
    updateLoopDisplay(); drawWave();
    flash('lpOutCard');
    setStatus(`Loop Out → ${ft(loopEnd)}`);
}

function resetLoop() {
    if (!audioBuffer) return;
    loopStart = 0; loopEnd = audioBuffer.duration;
    pbStartOffset = 0;
    if (sourceNode) {
        sourceNode.loopStart = loopStart; sourceNode.loopEnd = loopEnd;
        pbStartTime = audioCtx.currentTime; lcBaseTime = audioCtx.currentTime; loopCount = 0;
        updateLoopBadge();
    }
    updateLoopDisplay(); drawWave();
    setStatus('Loop reset to full file');
}

function seekTo(time) {
    pbStartOffset = Math.max(0, Math.min(time, audioBuffer.duration));
    if (isPlaying) startPlayback(pbStartOffset);
    else drawWave();
}

// ─── SPEED ────────────────────────────────────────────────────────────────────
function setSpeed(val) {
    if (isPlaying) {
        pbStartOffset = getCurrentBufferTime();
        pbStartTime   = audioCtx.currentTime;
        lcBaseTime    = audioCtx.currentTime;
    }
    currentSpeed = val;
    document.getElementById('speedRange').value = val;
    document.getElementById('speedVal').textContent =
        (val === Math.round(val) ? val.toFixed(1) : val) + '×';
    document.querySelectorAll('.pre').forEach(p =>
        p.classList.toggle('active', Math.abs(parseFloat(p.dataset.spd) - val) < 0.01));
    if (sourceNode) sourceNode.playbackRate.value = val;
}

// ─── ANIMATION ────────────────────────────────────────────────────────────────
function animate() {
    drawWave();
    const pos = getCurrentBufferTime();
    document.getElementById('tCurrent').textContent = ft(pos);

    // Count loop cycles
    if (loopEnabled && isPlaying && loopEnd > loopStart) {
        const dur  = loopEnd - loopStart;
        const elap = (audioCtx.currentTime - lcBaseTime) * currentSpeed;
        const n    = Math.floor(elap / dur);
        if (n > loopCount) { loopCount = n; updateLoopBadge(); }
    }

    if (isPlaying) animFrame = requestAnimationFrame(animate);
}

// ─── WAVEFORM INTERACTION ─────────────────────────────────────────────────────
function clientXRatio(cx) {
    const r = canvas.getBoundingClientRect();
    return Math.max(0, Math.min(1, (cx - r.left) / r.width));
}

function pointerDown(cx) {
    if (!audioBuffer) return;
    const ratio  = clientXRatio(cx);
    const inR    = loopStart / audioBuffer.duration;
    const outR   = loopEnd   / audioBuffer.duration;
    const thresh = 0.05;
    if (Math.abs(ratio - inR)  < thresh) dragMode = 'in';
    else if (Math.abs(ratio - outR) < thresh) dragMode = 'out';
    else dragMode = 'seek';
}

function pointerMove(cx) {
    if (!dragMode || !audioBuffer || dragMode === 'seek') return;
    const t = clientXRatio(cx) * audioBuffer.duration;
    if (dragMode === 'in') {
        loopStart = Math.max(0, Math.min(t, loopEnd - 0.2));
        if (sourceNode) sourceNode.loopStart = loopStart;
    } else {
        loopEnd = Math.min(audioBuffer.duration, Math.max(t, loopStart + 0.2));
        if (sourceNode) sourceNode.loopEnd = loopEnd;
    }
    updateLoopDisplay();
    if (!isPlaying) drawWave();
}

function pointerUp(cx) {
    if (!audioBuffer) return;
    if (dragMode === 'seek') {
        seekTo(clientXRatio(cx) * audioBuffer.duration);
    } else if (dragMode === 'in' || dragMode === 'out') {
        // Resync position tracking after handle drag
        if (isPlaying) { pbStartOffset = getCurrentBufferTime(); pbStartTime = audioCtx.currentTime; lcBaseTime = audioCtx.currentTime; loopCount = 0; }
        drawWave();
    }
    dragMode = null;
}

// Mouse
canvas.addEventListener('mousedown',  e => { e.preventDefault(); pointerDown(e.clientX); });
document.addEventListener('mousemove', e => { if (dragMode) pointerMove(e.clientX); });
document.addEventListener('mouseup',   e => { if (dragMode !== null) pointerUp(e.clientX); dragMode = null; });

// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e.touches[0].clientX); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (dragMode) pointerMove(e.touches[0].clientX); }, {passive:false});
canvas.addEventListener('touchend',   e => { e.preventDefault(); if (dragMode !== null) pointerUp(e.changedTouches[0].clientX); dragMode = null; }, {passive:false});
document.addEventListener('touchend', e => { if (dragMode !== null) { pointerUp(e.changedTouches[0].clientX); dragMode = null; } });

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function updatePlayBtn() {
    playBtn.classList.toggle('playing', isPlaying);
    playBtn.innerHTML = isPlaying
        ? '<span class="pulse">⏸</span> PAUSE'
        : '<span class="pulse">▶</span> PLAY';
}

function updateLoopDisplay() {
    document.getElementById('lpIn').textContent  = ft(loopStart);
    document.getElementById('lpOut').textContent = audioBuffer ? ft(loopEnd) : '—';
}

function updateLoopBadge() {
    const badge = document.getElementById('loopBadge');
    if (loopCount > 0) { badge.classList.add('show'); document.getElementById('loopCount').textContent = loopCount; }
    else badge.classList.remove('show');
}

function flash(id) {
    const el = document.getElementById(id);
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 600);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function ft(s) {
    if (isNaN(s) || s == null) return '—';
    const m = Math.floor(s / 60);
    const sec = (s % 60);
    return `${m}:${sec < 10 ? '0' : ''}${sec.toFixed(1)}`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
drawWave();

// iOS: resume AudioContext on first touch
document.addEventListener('touchstart', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, {once: true});
</script>
</body>
</html>
